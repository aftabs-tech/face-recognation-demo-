
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Animal Face AI — Premium Top-3</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    .gauge-wrap {
  position: relative;
  width: 120px;
  height: 120px;
  margin-top: 15px;
}

.gauge {
  transform: rotate(-90deg);
}

.gauge-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-weight: 800;
  font-size: 18px;
  color: #fff;
}
    /* 🔥 SCANNING LINE */
.scan-line {
  position:absolute;
  left:0;
  width:100%;
  height:3px;
  background: linear-gradient(90deg, transparent, #00ff88, transparent);
  box-shadow: 0 0 20px #00ff88;
  animation: scanMove 2s linear infinite;
  display:none;
  z-index:5;
}

@keyframes scanMove {
  0% { top:0%; }
  100% { top:100%; }
}
    :root{
      --bg1: #071028;
      --bg2: #122033;
      --accent: #7c9cff;
      --card: rgba(255,255,255,0.04);
      --muted: #bfc9ff;
      --glass: rgba(255,255,255,0.03);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: linear-gradient(135deg,var(--bg1),var(--bg2));
      color:#eef2ff;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      padding:20px;
    }

    .app {
      width:100%;
      max-width:980px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:18px;
      padding:20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      display:grid;
      grid-template-columns: 1fr 360px;
      gap:20px;
      align-items:start;
    }

    /* left main column (camera + main result + top-3 cards stacked on mobile) */
    .left {
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .title {
      font-size:20px;
      font-weight:700;
      letter-spacing:0.2px;
    }
    .subtitle {
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
    }

    .video-wrap {
      position:relative;
      border-radius:12px;
      overflow:hidden;
      background:#000;
      height:340px;
    }
    video{
      width:100%;
      height:100%;
      object-fit:cover;
      transform: scaleX(-1);
      display:block;
    }
    .spinner-overlay{
      position:absolute;
      top:12px;
      right:12px;
      width:44px;height:44px;
      display:none;
      align-items:center;
      justify-content:center;
      background: rgba(0,0,0,0.45);
      border-radius:50%;
      z-index:3;
    }
    .spinner-overlay.show{ display:flex; }
    .spinner {
      width:26px;height:26px;border-radius:50%;
      border:4px solid rgba(255,255,255,0.12);
      border-top-color: var(--accent);
      animation: spin .9s linear infinite;
    }
    @keyframes spin{ to{ transform:rotate(360deg);} }

    .controls {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:8px;
    }
    .controls button {
      border:0;
      padding:10px 14px;
      border-radius:10px;
      background: linear-gradient(180deg,#4e73ff,#3f5be6);
      color:white;
      font-weight:600;
      cursor:pointer;
      box-shadow: 0 10px 22px rgba(30,60,140,0.18);
    }
    .controls button[disabled]{ opacity:0.45; cursor:default; }

    #status { color:var(--muted); font-size:13px; margin-top:6px; }

    /* RESULTS AREA (left column below video) */
    .results {
      display:flex;
      gap:12px;
      align-items:flex-start;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    /* Main best card (center large) */
    .main-card {
      background: var(--card);
      border-radius:14px;
      padding:12px;
      width:100%;
      display:flex;
      gap:12px;
      align-items:center;
      box-shadow: 0 14px 30px rgba(0,0,0,0.5);
      transition: transform .25s ease, box-shadow .25s ease;
      border: 1px solid rgba(255,255,255,0.03);
    }
    .main-card.highlight {
      transform: translateY(-6px);
      box-shadow: 0 30px 70px rgba(124,156,255,0.12);
      border-color: rgba(124,156,255,0.18);
    }

    .main-thumb{
      width:140px;
      height:140px;
      border-radius:10px;
      overflow:hidden;
      background:linear-gradient(180deg, rgba(0,0,0,0.3), rgba(255,255,255,0.02));
      flex:0 0 140px;
      display:flex; align-items:center; justify-content:center;
    }
    .main-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }

    .main-meta { flex:1; min-width:0; }
    .main-meta .name { font-size:18px; font-weight:800; color:#fff; display:flex; align-items:center; gap:10px; }
    .medal { font-size:18px; background: linear-gradient(90deg,#ffeaa7,#ffd166); color:#111; padding:6px 8px; border-radius:8px; font-weight:800; box-shadow: 0 8px 18px rgba(255,180,60,0.12); }

    .progress {
      height:12px;
      background: var(--glass);
      border-radius:10px;
      margin-top:12px;
      overflow:hidden;
    }
    .progress .fill{
      height:100%;
      width:0%;
      background: linear-gradient(90deg,var(--accent), #5cc0ff);
      transition: width 700ms cubic-bezier(.2,.9,.3,1);
    }
    .percent { margin-top:8px; font-size:12px; color:var(--muted); font-weight:600; }

    /* right column (top-2 and top-3 vertical cards) */
    .right {
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:stretch;
      justify-content:flex-start;
    }
    .small-card {
      background: var(--card);
      border-radius:12px;
      padding:10px;
      display:flex;
      gap:10px;
      align-items:center;
      border: 1px solid rgba(255,255,255,0.02);
      transition: transform .18s ease;
    }
    .small-card:hover { transform: translateY(-4px); }
    .small-thumb { width:70px; height:70px; border-radius:8px; overflow:hidden; background:#000; display:flex; align-items:center; justify-content:center; }
    .small-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
    .small-meta { flex:1; min-width:0; }
    .small-meta .name { font-weight:700; font-size:14px; color:#fff; }
    .small-meta .pct { margin-top:6px; color:var(--muted); font-weight:600; font-size:13px; }

    /* bottom top-row (for responsive or fallback) */
    .top-row { display:flex; gap:12px; justify-content:center; margin-top:6px; flex-wrap:wrap; }

    /* placeholder thumbnail style */
    .placeholder {
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      color: rgba(255,255,255,0.18);
      font-weight:700;
      font-size:22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    }

    /* responsiveness */
    @media (max-width:860px){
      .app { grid-template-columns: 1fr; }
      .right { flex-direction:row; }
      .main-thumb{ width:110px; height:110px }
      .main-card{ padding:10px }
    }
    @media (max-width:520px){
      .video-wrap{ height:220px; }
      .main-thumb{ width:96px; height:96px }
      .main-card{ gap:8px; padding:10px; }
      .right{ flex-direction:row; gap:8px; overflow-x:auto; }
      .small-card{ min-width:140px; flex:0 0 140px; }
    }

<body>
  <div class="app" role="main" aria-live="polite">
    <div class="left">
      <div>
        <div class="title">Animal Face AI</div>
        <div class="subtitle">Live webcam demo — Top 3 matches with similarity</div>
      </div>

      <div class="video-wrap" aria-hidden="false">
        <video id="video" autoplay playsinline></video>
        <div id="scanOverlay"></div>
        <div id="scanLine" class="scan-line"></div>
        <div id="spinnerOverlay" class="spinner-overlay" aria-hidden="true"><div class="spinner" role="status" aria-label="Detecting"></div></div>
      </div>

        <button id="startBtn" onclick="startCamera()">Start Camera</button>

          <div class="main-thumb" id="mainThumb">
            <div class="placeholder">?</div>
          </div>
          <div class="main-meta">
            <div class="name" id="mainName">—</div>
            <div class="percent" id="mainPercent"> </div>
<div class="gauge-wrap">
  <svg class="gauge" width="120" height="120">
    <circle
      cx="60"
      cy="60"
      r="50"
      stroke="rgba(255,255,255,0.1)"
      stroke-width="10"
      fill="none"
    />
    <circle
      id="gaugeProgress"
      cx="60"
      cy="60"
      r="50"
      stroke="#7c9cff"
      stroke-width="10"
      fill="none"
      stroke-linecap="round"
      stroke-dasharray="314"
      stroke-dashoffset="314"
    />
  </svg>
  <div class="gauge-text" id="gaugeText">0%</div>
</div>          </div>
          <div style="flex:0 0 56px;display:flex;align-items:flex-start;justify-content:flex-end;">
            <div class="medal" id="mainMedal" title="Top match">🥇</div>
          </div>
        </div>
      </div>

      small top-row as fallback on small screens
      <div id="topRowSmall" class="top-row" aria-hidden="true"></div>
    </div>

    <div class="right" aria-hidden="false">
      <div id="card2" class="small-card">
        <div class="small-thumb" id="thumb2"><div class="placeholder">2</div></div>
        <div class="small-meta">
          <div class="name" id="name2">—</div>
          <div class="pct" id="pct2"> </div>
        </div>
      </div>

      <div id="card3" class="small-card">
        <div class="small-thumb" id="thumb3"><div class="placeholder">3</div></div>
        <div class="small-meta">
          <div class="name" id="name3">—</div>
          <div class="pct" id="pct3"> </div>
        </div>
      </div>

  <canvas id="canvas" style="display:none"></canvas>

<script>
  function animateGauge(percent){
  const circle = document.getElementById("gaugeProgress");
  const text = document.getElementById("gaugeText");

  const radius = 50;
  const circumference = 2 * Math.PI * radius;

  const offset = circumference - (percent / 100) * circumference;

  circle.style.strokeDashoffset = offset;

  let current = 0;
  const interval = setInterval(() => {
    current += 1;
    if(current >= percent){
      current = percent;
      clearInterval(interval);
    }
    text.textContent = current + "%";
  }, 10);
}
function speakResult(animal, similarity){
  if (!('speechSynthesis' in window)) return;

  const percent = Math.round(similarity * 100);

  const text = `You look like a ${animal}. Confidence ${percent} percent.`;

  const speech = new SpeechSynthesisUtterance(text);

  speech.rate = 1;
  speech.pitch = 1;
  speech.volume = 1;

  window.speechSynthesis.cancel(); // stop previous speech
  window.speechSynthesis.speak(speech);
}
  function animatePercent(element, finalValue){
  let current = 0;
  const duration = 800;
  const stepTime = 15;
  const increment = finalValue / (duration / stepTime);

  const counter = setInterval(()=>{
    current += increment;
    if(current >= finalValue){
      current = finalValue;
      clearInterval(counter);
    }
    element.textContent = Math.round(current) + "% similar";
  }, stepTime);
}
  // DOM refs
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const spinnerOverlay = document.getElementById('spinnerOverlay');
  const startBtn = document.getElementById('startBtn');
  const detectBtn = document.getElementById('detectBtn');
  const autoBtn = document.getElementById('autoBtn');
  const stopBtn = document.getElementById('stopBtn');
  const status = document.getElementById('status');

  // main
  const mainThumb = document.getElementById('mainThumb');
  const mainName = document.getElementById('mainName');
  const mainPercent = document.getElementById('mainPercent');
  const mainFill = document.getElementById('mainFill');
  const mainCard = document.getElementById('mainCard');

  // small cards
  const thumb2 = document.getElementById('thumb2');
  const name2 = document.getElementById('name2');
  const pct2 = document.getElementById('pct2');

  const thumb3 = document.getElementById('thumb3');
  const name3 = document.getElementById('name3');
  const pct3 = document.getElementById('pct3');

  const topRowSmall = document.getElementById('topRowSmall');

  let intervalId = null;
  let isDetecting = false;
  let lastTopNames = [];

  async function startCamera(){
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      status.innerText = "Camera started";
    } catch (err) {
      status.innerText = "Camera permission denied or unavailable";
    }
  }

  function setLoading(on){
    if (on){
      spinnerOverlay.classList.add('show');
      status.innerText = "Detecting...";
      detectBtn.disabled = true;
      autoBtn.disabled = true;
      stopBtn.disabled = true;
      startBtn.disabled = true;
    } else {
      spinnerOverlay.classList.remove('show');
      detectBtn.disabled = false;
      autoBtn.disabled = false;
      stopBtn.disabled = false;
      startBtn.disabled = false;
    }
  }

  // utility to set thumbnail (image or placeholder)
  function setThumb(container, url, labelFallback){
    container.innerHTML = "";
    if (url){
      const img = document.createElement('img');
      img.src = url;
      img.alt = labelFallback || "animal";
      img.style.width = "100%";
      img.style.height = "100%";
      img.onerror = () => {
        container.innerHTML = `<div class="placeholder">${(labelFallback||'?')[0]||'?'}</div>`;
      };
      container.appendChild(img);
    } else {
      container.innerHTML = `<div class="placeholder">${(labelFallback||'?')[0]||'?'}</div>`;
    }
  }

  function renderTopSmall(top){
    topRowSmall.innerHTML = "";
    if (!Array.isArray(top)) return;
    for (let i=0;i<top.length;i++){
      const item = top[i];
      const card = document.createElement('div');
      card.style.width = "120px";
      card.style.background = "var(--card)";
      card.style.borderRadius = "8px";
      card.style.padding = "8px";
      card.style.textAlign = "center";
      card.style.fontWeight = "700";
      card.style.fontSize = "13px";
      const img = document.createElement('div');
      img.style.height = "64px";
      img.style.marginBottom = "8px";
      img.style.overflow = "hidden";
      img.style.borderRadius = "6px";
      if (item.image_url){
        const im = document.createElement('img');
        im.src = item.image_url;
        im.style.width = "100%";
        im.style.height = "64px";
        im.style.objectFit = "cover";
        img.appendChild(im);
      } else {
        img.innerHTML = `<div style="height:64px; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.16)">${item.animal[0]||'?'}</div>`;
      }
      const nm = document.createElement('div');
      nm.textContent = item.animal;
      nm.style.marginTop = "4px";
      const pc = document.createElement('div');
      pc.style.marginTop = "6px";
      pc.style.color = "var(--muted)";
      pc.textContent = Math.round(item.similarity*100) + "%";
      card.appendChild(img);
      card.appendChild(nm);
      card.appendChild(pc);
      topRowSmall.appendChild(card);
    }
  }

  // Smoothly update bar width (value between 0..100)
  function updateProgress(fillEl, percent){
    // clamp
    const p = Math.max(0, Math.min(100, Math.round(percent)));
    // small delay so transition visible
    requestAnimationFrame(()=> fillEl.style.width = p + "%");
  }

  function updateMainAndSmall(top){
    // top is array sorted best->worst (length up to 3)
    // set defaults
    mainName.textContent = "—";
    mainPercent.textContent = "";
   
    setThumb(mainThumb, "", "?");

    name2.textContent = "—"; pct2.textContent = ""; thumb2.innerHTML = `<div class="placeholder">2</div>`;
    name3.textContent = "—"; pct3.textContent = ""; thumb3.innerHTML = `<div class="placeholder">3</div>`;

    if (!Array.isArray(top) || top.length === 0) {
      mainCard.classList.remove('highlight');
      return;
    }

    // BEST
    const best = top[0];
    mainName.textContent = best.animal;
    const percent = Math.round(best.similarity * 100);
animateGauge(percent);
    animatePercent(mainPercent, best.similarity*100);
    updateProgress(mainFill, best.similarity*100);
    setThumb(mainThumb, best.image_url, best.animal);
    mainCard.classList.add('highlight');

    // #2
    if (top[1]){
      name2.textContent = top[1].animal;
      pct2.textContent = `${Math.round(top[1].similarity*100)}%`;
      setThumb(thumb2, top[1].image_url, top[1].animal);
    }

    // #3
    if (top[2]){
      name3.textContent = top[2].animal;
      pct3.textContent = `${Math.round(top[2].similarity*100)}%`;
      setThumb(thumb3, top[2].image_url, top[2].animal);
    }

    // small-row for mobile
    renderTopSmall(top);

    // small glow effect if changed
    const names = top.map(t=>t.animal).join("|");
    if (lastTopNames.length && lastTopNames.join("|") !== names){
      // briefly pulse
      mainCard.classList.add('highlight');
      setTimeout(()=> mainCard.classList.remove('highlight'), 900);
    }
    lastTopNames = top.map(t=>t.animal);
  }

  // Main detection function
  async function detectAnimal(){
    const overlay = document.getElementById("scanOverlay");
overlay.style.display = "block";
    const scanLine = document.getElementById("scanLine");
scanLine.style.display = "block";
setTimeout(()=>{
  overlay.style.display = "none";
},1500);
    
    if (!video.srcObject){
      status.innerText = "Start camera first";
      return;
    }
    setTimeout(()=>{
  scanLine.style.display = "none";
},1500);
    if (isDetecting) return;
    isDetecting = true;
    setLoading(true);

    try{
      const ctx = canvas.getContext('2d');
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg'));
      const formData = new FormData();
      formData.append('file', blob, 'frame.jpg');

      const res = await fetch('http://127.0.0.1:8000/detect', { method:'POST', body: formData });
      if (!res.ok){
        status.innerText = `Server error: ${res.status}`;
        throw new Error('Server ' + res.status);
      }
      const data = await res.json();
      console.log("DETECT response:", data);

      if (!data || data.top === undefined || data.top.length === 0){
        status.innerText = "No face found or no results. Try moving closer / better lighting.";
        updateMainAndSmall([]);
        return;
      }

      // update UI with top array
      updateMainAndSmall(data.top);
      const best = data.top[0];
speakResult(best.animal, best.similarity);

      status.innerText = "Done";
    }catch(err){
      console.error("Detect error:", err);
      status.innerText = "Error during detection";
    } finally {
      setLoading(false);
      isDetecting = false;
    }
  }

  function startAutoDetect(){
    if (intervalId) clearInterval(intervalId);
    intervalId = setInterval(()=> { if(!isDetecting) detectAnimal(); }, 1000);
    status.innerText = "Auto detect ON";
  }
  function stopAutoDetect(){
    if (intervalId){
      clearInterval(intervalId);
      intervalId = null;
      status.innerText = "Auto detect stopped";
    }
  }

  // start camera helper
  async function startCamera(){
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      status.innerText = "Camera started";
    } catch(e){
      status.innerText = "Camera permission denied or unavailable";
    }
  }

  // pause auto-detect when tab hidden
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && intervalId){
      clearInterval(intervalId);
      intervalId = null;
      status.innerText = "Auto paused (tab hidden)";
    }
  });

  // initialize placeholders
  updateMainAndSmall([]);
</script>
</body>
</html>
